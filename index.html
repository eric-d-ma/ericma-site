  <script>
    // ── Video selection ───────────────────────────────────────────────────────
    const stored = localStorage.getItem('lastVideo');
    const chosen = !stored
      ? (Math.random() < 0.5 ? 'video1.mp4' : 'video2.mp4')
      : (stored === 'video1.mp4' ? 'video2.mp4' : 'video1.mp4');
    localStorage.setItem('lastVideo', chosen);
    const video   = document.getElementById('bg-video');
    const overlay = chosen === 'video1.mp4'
      ? document.getElementById('overlay-1')
      : document.getElementById('overlay-2');

    video.src = chosen;
    video.load();
    overlay.style.display = 'block';

    // ── Autoplay with sound (falls back to muted if browser blocks) ───────────
    const muteBtn = document.getElementById('mute-btn');

    video.muted = true;
    video.addEventListener('canplay', () => {
      video.play().then(() => {
        video.muted = false;
        video.volume = 0.75;
      }).catch(() => {
        muteBtn.classList.add('muted');
      });
    }, { once: true });

    // ── Mute toggle ───────────────────────────────────────────────────────────
    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      muteBtn.classList.toggle('muted', video.muted);
    });

    // ── Hotspot: compute centroid, position label, enable click ───────────────
    document.querySelectorAll('.hotspot-group').forEach(group => {
      const polygon = group.querySelector('polygon');
      const text    = group.querySelector('text');
      const raw     = polygon.getAttribute('points').trim().split(/[\s,]+/).map(Number);

      let sx = 0, sy = 0;
      const n = raw.length / 2;
      for (let i = 0; i < raw.length; i += 2) { sx += raw[i]; sy += raw[i + 1]; }
      text.setAttribute('x', sx / n);
      text.setAttribute('y', group.dataset.labelY ?? sy / n);

      group.addEventListener('click', () => {
        window.location.href = group.dataset.href;
      });
    });
  </script>
